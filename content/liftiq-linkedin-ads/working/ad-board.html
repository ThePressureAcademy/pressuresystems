<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LIFTIQ LinkedIn Ad Board</title>
  <style>
    :root {
      --graphite: #08111d;
      --graphite-2: #0d1726;
      --steel: #536b84;
      --steel-soft: #a7b5c5;
      --text: #edf6ff;
      --muted: #9fb0c2;
      --line: rgba(167, 181, 197, 0.22);
      --rust: #bd7148;
      --rust-2: #ec9b62;
      --cyan: #32d1ff;
      --teal: #42d6bf;
      --amber: #f2bd58;
      --shadow: rgba(0, 0, 0, 0.42);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Arial Narrow", "Segoe UI Condensed", "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background: var(--graphite);
    }

    .canvas {
      width: 100vw;
      height: 100vh;
      position: relative;
      display: grid;
      padding: 64px;
      isolation: isolate;
      background:
        radial-gradient(circle at 8% 8%, rgba(50, 209, 255, 0.20), transparent 26%),
        radial-gradient(circle at 92% 12%, rgba(189, 113, 72, 0.22), transparent 28%),
        linear-gradient(135deg, #050b12 0%, #0b1522 48%, #08101b 100%);
    }

    .canvas::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(167, 181, 197, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(167, 181, 197, 0.045) 1px, transparent 1px);
      background-size: 36px 36px;
      mask-image: linear-gradient(90deg, transparent, black 14%, black 86%, transparent);
      z-index: -1;
    }

    .brand {
      position: absolute;
      top: 34px;
      left: 44px;
      display: flex;
      align-items: center;
      gap: 12px;
      letter-spacing: 0.16em;
      font-size: 18px;
      font-weight: 800;
      color: #fff;
    }

    .brand-mark {
      width: 35px;
      height: 35px;
      border: 1px solid rgba(50, 209, 255, 0.55);
      border-radius: 10px;
      display: grid;
      place-items: center;
      box-shadow: 0 0 24px rgba(50, 209, 255, 0.22);
      color: var(--cyan);
      font-size: 21px;
      line-height: 1;
    }

    .meta {
      position: absolute;
      top: 38px;
      right: 44px;
      font-family: "Consolas", "Cascadia Mono", monospace;
      font-size: 12px;
      letter-spacing: 0.14em;
      color: var(--steel-soft);
      text-transform: uppercase;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 0.95fr) minmax(0, 1.05fr);
      gap: 44px;
      align-items: center;
      width: 100%;
      height: 100%;
    }

    .copy {
      align-self: center;
      max-width: 560px;
    }

    .hook {
      margin: 0;
      font-size: clamp(58px, 6.8vw, 92px);
      line-height: 0.91;
      letter-spacing: -0.055em;
      font-weight: 900;
      text-wrap: balance;
    }

    .subline {
      margin: 28px 0 0;
      max-width: 520px;
      font-size: clamp(24px, 2.6vw, 34px);
      line-height: 1.08;
      color: var(--steel-soft);
      font-weight: 650;
      letter-spacing: -0.02em;
    }

    .proof-tag {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      padding: 9px 13px;
      border: 1px solid rgba(236, 155, 98, 0.5);
      border-radius: 999px;
      color: #ffd4b6;
      background: rgba(189, 113, 72, 0.12);
      font-family: "Consolas", "Cascadia Mono", monospace;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 34px;
      padding: 15px 19px;
      border-left: 4px solid var(--rust-2);
      background: rgba(255, 255, 255, 0.055);
      color: #fff;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: 0.02em;
    }

    .boundary {
      margin-top: 22px;
      color: var(--muted);
      font-family: "Consolas", "Cascadia Mono", monospace;
      font-size: 13px;
      line-height: 1.35;
    }

    .visual {
      position: relative;
      min-height: 0;
    }

    .proof-frame {
      position: relative;
      min-height: 610px;
      border: 1px solid var(--line);
      border-radius: 34px;
      background: rgba(13, 23, 38, 0.92);
      box-shadow: 0 26px 80px var(--shadow);
      overflow: hidden;
    }

    .proof-frame::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(140deg, rgba(50, 209, 255, 0.10), transparent 34%),
        linear-gradient(320deg, rgba(189, 113, 72, 0.16), transparent 36%);
      pointer-events: none;
    }

    .window-bar {
      height: 46px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(5, 11, 18, 0.52);
      color: var(--muted);
      font-family: "Consolas", "Cascadia Mono", monospace;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--rust);
      box-shadow: 16px 0 0 rgba(242, 189, 88, 0.8), 32px 0 0 rgba(66, 214, 191, 0.8);
      margin-right: 38px;
    }

    .proof-body {
      padding: 28px;
      position: relative;
    }

    .mini-label {
      color: var(--cyan);
      font-family: "Consolas", "Cascadia Mono", monospace;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      margin-bottom: 14px;
    }

    .panel {
      border: 1px solid rgba(167, 181, 197, 0.2);
      border-radius: 22px;
      padding: 20px;
      background: rgba(5, 11, 18, 0.62);
      margin-bottom: 16px;
    }

    .panel-title {
      margin: 0 0 12px;
      font-size: 22px;
      line-height: 1.05;
      letter-spacing: -0.02em;
      font-weight: 850;
    }

    .note {
      font-family: "Consolas", "Cascadia Mono", monospace;
      color: #d2deeb;
      font-size: 14px;
      line-height: 1.45;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.045);
      border: 1px dashed rgba(167, 181, 197, 0.24);
      margin: 0 0 16px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
    }

    .chip {
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(50, 209, 255, 0.10);
      border: 1px solid rgba(50, 209, 255, 0.24);
      color: #dff7ff;
      font-size: 13px;
      font-weight: 800;
    }

    .chip.warn {
      background: rgba(189, 113, 72, 0.14);
      border-color: rgba(236, 155, 98, 0.42);
      color: #ffd8bd;
    }

    .rank-row {
      display: grid;
      grid-template-columns: 54px 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 15px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.055);
      border: 1px solid rgba(167, 181, 197, 0.18);
      margin-bottom: 12px;
    }

    .score {
      width: 54px;
      height: 54px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      background: rgba(66, 214, 191, 0.14);
      border: 1px solid rgba(66, 214, 191, 0.3);
      color: #cffff6;
      font-weight: 900;
      font-size: 21px;
    }

    .rank-row h4 {
      margin: 0 0 5px;
      font-size: 18px;
      letter-spacing: -0.01em;
    }

    .rank-row p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .status {
      font-family: "Consolas", "Cascadia Mono", monospace;
      font-size: 12px;
      color: var(--amber);
      text-transform: uppercase;
    }

    .mode-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .mode-card {
      min-height: 235px;
      border-radius: 24px;
      padding: 20px;
      border: 1px solid rgba(167, 181, 197, 0.22);
      background: rgba(255, 255, 255, 0.055);
    }

    .mode-card h3 {
      margin: 0 0 14px;
      font-size: 27px;
      line-height: 0.98;
      letter-spacing: -0.04em;
    }

    .mode-card ul {
      margin: 0;
      padding-left: 17px;
      color: var(--steel-soft);
      font-size: 14px;
      line-height: 1.55;
    }

    .review-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .review-item {
      border-radius: 20px;
      padding: 18px;
      background: rgba(255, 255, 255, 0.052);
      border: 1px solid rgba(167, 181, 197, 0.18);
    }

    .review-item strong {
      display: block;
      font-size: 20px;
      margin-bottom: 8px;
      color: #fff;
    }

    .review-item span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .page-crop {
      height: 220px;
      margin-top: 18px;
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid rgba(167, 181, 197, 0.2);
      opacity: 0.82;
    }

    .page-crop img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      filter: saturate(0.9) contrast(1.05);
    }

    .source-note {
      position: absolute;
      right: 26px;
      bottom: 22px;
      color: rgba(237, 246, 255, 0.62);
      font-family: "Consolas", "Cascadia Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .landscape {
      padding: 44px 54px;
    }

    .landscape .brand {
      top: 24px;
      left: 34px;
      font-size: 15px;
    }

    .landscape .meta {
      top: 27px;
      right: 34px;
      font-size: 10px;
    }

    .landscape .layout {
      grid-template-columns: 0.9fr 1.15fr;
      gap: 32px;
      padding-top: 26px;
    }

    .landscape .hook {
      font-size: clamp(44px, 5.4vw, 62px);
      line-height: 0.93;
    }

    .landscape .subline {
      margin-top: 18px;
      font-size: 21px;
      max-width: 470px;
    }

    .landscape .proof-tag {
      margin-bottom: 16px;
      font-size: 11px;
    }

    .landscape .cta {
      margin-top: 18px;
      font-size: 15px;
      padding: 11px 15px;
    }

    .landscape .boundary {
      margin-top: 12px;
      font-size: 11px;
    }

    .landscape .proof-frame {
      min-height: 484px;
      border-radius: 26px;
    }

    .landscape .window-bar {
      height: 38px;
      font-size: 10px;
    }

    .landscape .proof-body {
      padding: 20px;
    }

    .landscape .panel {
      padding: 16px;
      margin-bottom: 11px;
      border-radius: 18px;
    }

    .landscape .panel-title {
      font-size: 18px;
      margin-bottom: 9px;
    }

    .landscape .note {
      font-size: 12px;
      padding: 10px;
      margin-bottom: 10px;
    }

    .landscape .chip {
      font-size: 11px;
      padding: 6px 8px;
    }

    .landscape .rank-row {
      grid-template-columns: 44px 1fr auto;
      padding: 10px;
      gap: 10px;
      margin-bottom: 8px;
      border-radius: 14px;
    }

    .landscape .score {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      font-size: 17px;
    }

    .landscape .rank-row h4 {
      font-size: 15px;
    }

    .landscape .rank-row p,
    .landscape .status,
    .landscape .review-item span {
      font-size: 11px;
    }

    .landscape .mode-card {
      min-height: 174px;
      padding: 15px;
      border-radius: 18px;
    }

    .landscape .mode-card h3 {
      font-size: 21px;
    }

    .landscape .mode-card ul {
      font-size: 11px;
      line-height: 1.42;
    }

    .landscape .review-item {
      padding: 13px;
      border-radius: 15px;
    }

    .landscape .review-item strong {
      font-size: 16px;
    }

    .landscape .page-crop {
      height: 115px;
      margin-top: 10px;
      border-radius: 16px;
    }

    .vertical {
      padding: 48px;
    }

    .vertical .layout {
      grid-template-columns: 1fr;
      gap: 28px;
      align-content: center;
      padding-top: 34px;
    }

    .vertical .hook {
      font-size: 56px;
    }

    .vertical .subline {
      font-size: 23px;
      margin-top: 18px;
    }

    .vertical .proof-frame {
      min-height: 420px;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const ads = {
      1: {
        code: "AD 01 / JOB INTAKE",
        tag: "Job Brief Import / pilot workflow preview",
        hook: "Rough job notes should not become dispatch rework.",
        subline: "LIFTIQ helps turn pasted job details into reviewed requirements before allocation.",
        cta: "Watch the portal walkthrough",
        boundary: "Dispatcher reviews before the job enters allocation.",
        visual: "job"
      },
      2: {
        code: "AD 02 / SMARTRANK",
        tag: "Explainable recommendations / pilot workflow preview",
        hook: "Why was this worker selected?",
        subline: "SmartRank shows credential, fatigue, schedule, and preference reasoning before allocation.",
        cta: "See LIFTIQ in action",
        boundary: "The dispatcher remains the decision-maker.",
        visual: "rank"
      },
      3: {
        code: "AD 03 / OPERATING MODES",
        tag: "Labour-only + plant and labour / pilot workflow preview",
        hook: "Your dispatch screen should match your operation.",
        subline: "Use labour-only mode or plant + labour mode so the portal stays focused.",
        cta: "Request pilot access",
        boundary: "Company setup controls what appears in job intake.",
        visual: "modes"
      },
      4: {
        code: "AD 04 / CRANE TRANSPORT REVIEW",
        tag: "Crane, counterweight, transport / pilot workflow preview",
        hook: "Counterweight assumptions need a review trail.",
        subline: "Surface crane model, travel state, counterweight gap, support transport, and road-access review flags.",
        cta: "Book LIFTIQ discovery call",
        boundary: "Review flags only. No permit, road-access, or lift-engineering approval.",
        visual: "crane"
      }
    };

    function visual(type) {
      if (type === "job") {
        return `
          <div class="mini-label">Pilot workflow preview</div>
          <div class="panel">
            <h3 class="panel-title">Job Brief Import</h3>
            <p class="note">Brisbane rooftop plant lift. Start 06:30. Need C6, dogman, 100T mobile crane, low loader review, site access before 07:00.</p>
            <div class="chips">
              <span class="chip">C6</span><span class="chip">Dogman</span><span class="chip">100T Mobile Crane</span><span class="chip warn">Low Loader Review</span><span class="chip">06:30 AEST</span>
            </div>
          </div>
          <div class="panel">
            <h3 class="panel-title">Review before creating job</h3>
            <div class="chips"><span class="chip">Requirements selected</span><span class="chip">Timezone set</span><span class="chip warn">One-off review note</span></div>
          </div>
          <div class="page-crop"><img src="../source-screenshots/demo-01-public-liftiq-page.png" alt=""></div>
        `;
      }
      if (type === "rank") {
        return `
          <div class="mini-label">Pilot workflow preview</div>
          <div class="rank-row"><div class="score">91</div><div><h4>Worker A</h4><p>Credential fit, clean fatigue load, matching task preference.</p></div><span class="status">Recommended</span></div>
          <div class="rank-row"><div class="score">73</div><div><h4>Worker B</h4><p>Available, but lower preference signal for this job type.</p></div><span class="status">Review</span></div>
          <div class="rank-row"><div class="score">BLOCK</div><div><h4>Worker C</h4><p>Missing selected credential requirement.</p></div><span class="status">CredentialGate</span></div>
          <div class="panel">
            <h3 class="panel-title">Visible reasoning</h3>
            <div class="chips"><span class="chip">Credentials</span><span class="chip">Fatigue</span><span class="chip">Schedule</span><span class="chip">Preferences</span><span class="chip warn">Override reason if needed</span></div>
          </div>
        `;
      }
      if (type === "modes") {
        return `
          <div class="mini-label">Our Business setup preview</div>
          <div class="mode-cards">
            <div class="mode-card">
              <h3>Labour-only</h3>
              <ul><li>Workers</li><li>Credentials and VOCs</li><li>Fatigue and availability</li><li>SmartRank and audit</li></ul>
            </div>
            <div class="mode-card">
              <h3>Plant + labour</h3>
              <ul><li>Asset register</li><li>Plant numbers</li><li>Crane and transport review</li><li>Worker allocation</li></ul>
            </div>
          </div>
          <div class="panel">
            <h3 class="panel-title">Filtered job intake</h3>
            <div class="chips"><span class="chip">Company catalogue</span><span class="chip">One-off requirements</span><span class="chip">Relevant options only</span></div>
          </div>
          <div class="page-crop"><img src="../source-screenshots/liftiq-home-og.png" alt=""></div>
        `;
      }
      return `
        <div class="mini-label">Pilot workflow preview</div>
        <div class="panel">
          <h3 class="panel-title">Crane and transport review</h3>
          <div class="review-grid">
            <div class="review-item"><strong>GMK5150L</strong><span>Crane model captured for planning context.</span></div>
            <div class="review-item"><strong>24t gap</strong><span>Counterweight transport review flag visible.</span></div>
            <div class="review-item"><strong>Support transport</strong><span>Low loader / semi-trailer review requirement.</span></div>
            <div class="review-item"><strong>Road-access review</strong><span>Review prompt before dispatch assumptions are made.</span></div>
          </div>
        </div>
        <div class="panel">
          <h3 class="panel-title">Not an approval engine</h3>
          <div class="chips"><span class="chip warn">Review required</span><span class="chip">Audit trail</span><span class="chip">Dispatcher decision</span></div>
        </div>
      `;
    }

    function render() {
      const params = new URLSearchParams(window.location.search);
      const ad = ads[params.get("ad") || "1"];
      const format = params.get("format") || "square";
      document.getElementById("app").innerHTML = `
        <main class="canvas ${format}">
          <div class="brand"><span class="brand-mark">L</span><span>LIFTIQ</span></div>
          <div class="meta">Dispatch intelligence / pilot-stage</div>
          <div class="layout">
            <section class="copy">
              <div class="proof-tag">${ad.tag}</div>
              <h1 class="hook">${ad.hook}</h1>
              <p class="subline">${ad.subline}</p>
              <div class="cta">${ad.cta} <span>-></span></div>
              <div class="boundary">${ad.boundary}</div>
            </section>
            <section class="visual">
              <div class="proof-frame">
                <div class="window-bar"><span class="dot"></span>${ad.code}</div>
                <div class="proof-body">${visual(ad.visual)}</div>
                <div class="source-note">Synthetic/demo labels only</div>
              </div>
            </section>
          </div>
        </main>
      `;
    }

    render();
  </script>
</body>
</html>
