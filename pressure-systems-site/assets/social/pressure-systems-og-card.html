<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pressure Systems OG Card</title>
  <style>
    :root {
      --ink: #1f2528;
      --paper: #f7f3ec;
      --surface: #fbf8f4;
      --band: #ece4d9;
      --border: #ddd2c5;
      --field: #556261;
      --red: #7a2634;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(122, 38, 52, 0.14), transparent 26%),
        linear-gradient(180deg, #fcf9f4 0%, var(--paper) 100%);
    }

    body {
      color: var(--ink);
      font-family: "IBM Plex Sans", "Segoe UI", Arial, sans-serif;
    }

    .frame {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 42px;
    }

    .card {
      width: 100%;
      height: 100%;
      border-radius: 32px;
      border: 1px solid var(--border);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.42), rgba(255, 255, 255, 0.18)),
        var(--surface);
      box-shadow: 0 24px 60px rgba(31, 37, 40, 0.1);
      padding: 38px 42px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 22px;
    }

    .eyebrow {
      margin: 0;
      color: var(--field);
      font-size: 16px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }

    .logo {
      width: 690px;
      max-width: 100%;
      display: block;
    }

    h1 {
      margin: 0;
      font-family: "IBM Plex Serif", Georgia, serif;
      font-size: 58px;
      line-height: 0.98;
      letter-spacing: -0.04em;
      max-width: 700px;
    }

    p {
      margin: 0;
      max-width: 700px;
      color: var(--field);
      font-size: 24px;
      line-height: 1.32;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
      padding-top: 18px;
      border-top: 1px solid rgba(31, 37, 40, 0.12);
    }

    .footer span {
      font-size: 16px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--field);
    }

    .signal {
      width: 120px;
      height: 10px;
      border-radius: 999px;
      background: var(--red);
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="card">
      <p class="eyebrow">Pressure Systems</p>
      <div>
        <img class="logo" src="../logos/pressure-systems-wordmark-primary.svg" alt="Pressure Systems">
        <h1>We turn operational mess into buildable systems.</h1>
        <p>Audit-first trust repair and structural website cleanup for operator-led businesses that need to look credible and in control.</p>
      </div>
      <div class="footer">
        <span>Trust repair / structural cleanup / governed next steps</span>
        <div class="signal" aria-hidden="true"></div>
      </div>
    </div>
  </div>
</body>
</html>
